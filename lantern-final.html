<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE LANTERN</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: #d4d0c8;
  background-image: radial-gradient(rgba(255,255,255,.18) 1px, transparent 1px);
  background-size: 4px 4px;
  font-family: Arial, Helvetica, sans-serif;
  padding: 22px;
  min-height: 100vh;
}

/* HEADER */
.site-header {
  text-align: center;
  background: #ececec;
  border: 2px ridge #cfcfcf;
  padding: 24px 20px 20px;
  margin-bottom: 20px;
}
.site-header h1 {
  font-family: Georgia, "Times New Roman", serif;
  color: #990000;
  font-size: 52px;
  letter-spacing: 4px;
  font-weight: normal;
  text-shadow: 1px 1px #ffffff;
}
.site-header .tagline {
  font-size: 13px;
  color: #444;
  max-width: 680px;
  margin: 12px auto 0;
  line-height: 1.5;
}

/* FILTER PANEL */
.filter-panel {
  background: #c8c8c8;
  border: 2px inset #eee;
  padding: 12px 14px;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.filter-panel input,
.filter-panel select,
.filter-panel button {
  font-family: Arial, sans-serif;
  font-size: 13px;
  background: #ececec;
  border: 2px outset #fff;
  padding: 5px 9px;
  color: #000;
  cursor: pointer;
  border-radius: 0;
}
.filter-panel input {
  flex: 1;
  min-width: 160px;
}
.filter-panel button:active {
  border: 2px inset #fff;
}
.filter-count {
  font-size: 12px;
  color: #555;
  margin-left: auto;
  white-space: nowrap;
}

/* GALLERY GRID */
#gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px;
}

/* CARD */
.card {
  background: #ececec;
  border: 2px ridge #c8c8c8;
  display: flex;
  flex-direction: column;
  cursor: pointer;
  transition: border-color 0.1s;
}
.card:hover {
  border-color: #111166;
}
.card-img-wrap {
  width: 100%;
  height: 160px;
  overflow: hidden;
  background: #bbb;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.card-img-wrap .img-fallback {
  font-size: 11px;
  color: #666;
  text-align: center;
  padding: 8px;
  display: none;
}
.card-body {
  padding: 8px 9px 10px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.card-title {
  font-size: 12px;
  font-weight: bold;
  line-height: 1.3;
  color: #111;
}
.card-meta {
  font-size: 11px;
  color: #555;
  line-height: 1.4;
}
.card-caption {
  font-size: 11px;
  color: #333;
  line-height: 1.4;
  font-style: italic;
  display: none;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  margin-top: 2px;
}
.tag-pill {
  font-size: 10px;
  border: 1px solid #999;
  background: #ddd;
  padding: 2px 5px;
  cursor: pointer;
  white-space: nowrap;
  color: #333;
}
.tag-pill:hover {
  background: #111166;
  color: #fff;
  border-color: #111166;
}
.card-link {
  font-size: 10px;
  color: #111166;
  text-decoration: none;
  margin-top: auto;
  padding-top: 4px;
}
.card-link:hover { text-decoration: underline; }

/* EMPTY STATE */
#empty-state {
  display: none;
  text-align: center;
  padding: 60px 20px;
  color: #666;
  font-size: 14px;
  grid-column: 1 / -1;
}

/* FLAG BADGE */
.flag-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  background: #cc8800;
  color: #fff;
  font-size: 9px;
  padding: 2px 4px;
  font-weight: bold;
}
</style>
</head>
<body>
<header class="site-header">
  <h1>THE LANTERN</h1>
  <p class="tagline">Filtering archives through the lens of personal interests to discover the weird, the strange, the forgotten, and the overlooked details of everyday life.</p>
</header>

<div class="filter-panel">
  <input id="searchInput" type="text" placeholder="Search title or #tags..." oninput="render()">

  <select id="colorFilter" onchange="render()">
    <option value="">SAT</option>
    <option value="Color">Color</option>
    <option value="B&W">B&W</option>
  </select>

  <select id="locFilter" onchange="render()">
    <option value="">INT/EXT</option>
    <option value="Interior">Interior</option>
    <option value="Exterior">Exterior</option>
    <option value="Unknown">Unknown</option>
  </select>

  <select id="continentFilter" onchange="render()">
    <option value="">GEOGRAPHY</option>
    <option value="North America">North America</option>
    <option value="Europe">Europe</option>
    <option value="Asia">Asia</option>
    <option value="Other">Other</option>
  </select>

  <select id="manifestationFilter" onchange="render()">
    <option value="">TYPE</option>
    <option value="Book Illustration">Book Illustration</option>
    <option value="Spirit Photograph">Spirit Photograph</option>
    <option value="Performance Portrait">Performance Portrait</option>
    <option value="Poster">Poster</option>
    <option value="Street Portrait">Street Portrait</option>
    <option value="Environmental Portrait">Environmental Portrait</option>
    <option value="Interior">Interior</option>
    <option value="Performance Scene">Performance Scene</option>
    <option value="Occupational Portrait">Occupational Portrait</option>
    <option value="Work Scene">Work Scene</option>
  </select>

  <select id="shotFilter" onchange="render()">
    <option value="">SHOT</option>
    <option value="Wide">Wide</option>
    <option value="Medium">Medium</option>
    <option value="Close-up">Close-up</option>
  </select>

  <button onclick="resetFilters()">Reset</button>
  <span class="filter-count" id="filterCount"></span>
</div>

<div id="gallery"></div>
<script>
const GIST_URL = "https://cdn.jsdelivr.net/gist/unlikely-archivist/64f43aa88c7bd3790d8e4db003846ac1/Lantern-data.json";

async function init() {
  try {
    const res = await fetch(GIST_URL);
    window.lanternData = await res.json();
    render();
  } catch (e) {
    document.getElementById("gallery").innerHTML =
      '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#900;">Failed to load data. Check Gist URL.</div>';
  }
}

function getFilters() {
  return {
    search: document.getElementById("searchInput").value.toLowerCase().trim(),
    color: document.getElementById("colorFilter").value,
    loc: document.getElementById("locFilter").value,
    continent: document.getElementById("continentFilter").value,
    manifestation: document.getElementById("manifestationFilter").value,
    shot: document.getElementById("shotFilter").value,
    tag: window._activeTag || ""
  };
}

function matchesFilters(item, f) {
  if (f.color && item.color !== f.color) return false;
  if (f.loc && item.loc !== f.loc) return false;
  if (f.continent && item.continent !== f.continent) return false;
  if (f.manifestation && item.manifestation !== f.manifestation) return false;
  if (f.shot && item.shot !== f.shot) return false;
  if (f.tag && !item.tags.includes(f.tag)) return false;
  if (f.search) {
    const haystack = item.title.toLowerCase() + " " + item.tags.join(" ").toLowerCase() + " " + item.caption.toLowerCase();
    if (!haystack.includes(f.search)) return false;
  }
  return true;
}

function render() {
  const gallery = document.getElementById("gallery");
  const f = getFilters();
  const filtered = lanternData.filter(item => matchesFilters(item, f));

  document.getElementById("filterCount").textContent = filtered.length + " / " + lanternData.length;

  if (filtered.length === 0) {
    gallery.innerHTML = '<div id="empty-state" style="display:block;grid-column:1/-1;text-align:center;padding:60px 20px;color:#666;font-size:14px;">No results. <a href="#" onclick="resetFilters();return false;">Reset filters</a></div>';
    return;
  }

  gallery.innerHTML = filtered.map(item => {
    const tagsHtml = item.tags.map(t =>
      `<span class="tag-pill" onclick="filterByTag('${t}')">${t}</span>`
    ).join("");

    const flagHtml = item.flag
      ? `<span class="flag-badge" title="${item.flag}">!</span>`
      : "";

    return `
      <div class="card" onclick="window.open('${item.sourceUrl}','_blank')">
        <div class="card-img-wrap">
          <img src="${item.imgSrc}" alt="${item.title}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <div class="img-fallback">Image unavailable<br><small>${item.title}</small></div>
          ${flagHtml}
        </div>
        <div class="card-body">
          <div class="card-title">${item.title}</div>
          <div class="card-meta">${item.manifestation} · ${item.color} · ${item.loc} · ${item.shot}</div>
          <div class="card-caption">${item.caption}</div>
          <div class="card-tags">${tagsHtml}</div>
          <a class="card-link" href="${item.sourceUrl}" target="_blank" onclick="event.stopPropagation()">View at LOC →</a>
        </div>
      </div>`;
  }).join("");
}

function filterByTag(tag) {
  window._activeTag = tag;
  document.getElementById("searchInput").value = tag;
  render();
}

function resetFilters() {
  window._activeTag = "";
  document.getElementById("searchInput").value = "";
  document.getElementById("colorFilter").value = "";
  document.getElementById("locFilter").value = "";
  document.getElementById("continentFilter").value = "";
  document.getElementById("manifestationFilter").value = "";
  document.getElementById("shotFilter").value = "";
  render();
}

render();

init();
</script>
</body>
</html>
