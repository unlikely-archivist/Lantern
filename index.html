<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Lantern</title>
    <meta name="description" content="The Lantern archive and artist reference index." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" id="home">
      <h1>THE LANTERN</h1>
      <p class="tagline">Filtering archives through the lens of visual research to discover the strange, forgotten, overlooked, and useful details of everyday life.</p>
    </header>

    <main>
      <section class="section-block archive-home" id="archive">
        <div class="archive-layout">
          <aside class="filter-sidebar" aria-label="Archive filters">
            <details class="filter-drawer" open>
              <summary>Filter</summary>

              <div class="filter-group search-group">
                <label class="filter-label" for="archiveSearch">Search</label>
                <input id="archiveSearch" type="search" placeholder="dog, ritual, guard..." />
              </div>

              <div class="filter-group" data-filter="subjects">
                <p class="filter-label">Subjects</p>
                <div class="filter-options" id="archiveSubjects"></div>
              </div>

              <div class="filter-group" data-filter="imageStyle">
                <p class="filter-label">Style</p>
                <div class="filter-options" id="archiveImageStyle"></div>
              </div>

              <div class="filter-group" data-filter="peopleCount">
                <p class="filter-label">People</p>
                <div class="filter-options" id="archivePeopleCount"></div>
              </div>

              <div class="filter-group" data-filter="shot">
                <p class="filter-label">Shot</p>
                <div class="filter-options" id="archiveShot"></div>
              </div>

              <div class="filter-group" data-filter="locationType">
                <p class="filter-label">Place</p>
                <div class="filter-options" id="archiveLocationType"></div>
              </div>

              <div class="filter-group" data-filter="continent">
                <p class="filter-label">Region</p>
                <div class="filter-options" id="archiveContinent"></div>
              </div>

              <div class="filter-group" data-filter="timePeriod">
                <p class="filter-label">Time</p>
                <div class="filter-options" id="archiveTimePeriod"></div>
              </div>

              <div class="filter-group" data-filter="medium">
                <p class="filter-label">Medium</p>
                <div class="filter-options" id="archiveMedium"></div>
              </div>

              <div class="filter-actions">
                <button type="button" data-reset="archive">Reset</button>
              </div>
            </details>
          </aside>

          <div class="archive-results">
            <div class="results-bar">
              <span class="section-kicker">Unfiltered archive gallery</span>
              <span class="filter-count" id="archiveCount"></span>
            </div>
            <div id="archiveGrid" class="card-grid" aria-live="polite"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js" type="module"></script>
  </body>
</html>
