<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Lantern</title>
    <meta name="description" content="The Lantern archive and artist reference index." />
    <link rel="stylesheet" href="styles.css?v=10" />
  </head>
  <body>
    <a class="corner-link" href="art.html">View art collection</a>

    <header class="site-header" id="home">
      <h1><span>THE</span><span>LANTERN</span></h1>
      <div class="rule-star" aria-hidden="true"><span></span><b>✷</b><span></span></div>
      <p class="tagline">Filtering archives through the lens of my personal interests to discover the weird, the strange, the forgotten, and the overlooked details of everyday life.</p>
    </header>

    <main>
      <section class="section-block archive-home" id="archive">
        <div class="gallery-tools">
          <label class="top-search" for="archiveSearch">
            <input id="archiveSearch" type="search" placeholder="Search title or #tags..." />
          </label>

          <div class="quick-filters" aria-label="Archive filters">
            <select id="filterImageStyle"><option value="">Color</option></select>
            <select id="filterLocationType"><option value="">Loc</option></select>
            <select id="filterContinent"><option value="">Continent</option></select>
            <select id="filterSubjects"><option value="">Subj</option></select>
            <select id="filterShot"><option value="">Shot</option></select>
            <button type="button" data-reset="archive">Reset</button>
          </div>
        </div>

        <div class="archive-results">
          <p class="filter-count" id="archiveCount"></p>
          <div id="archiveGrid" class="card-grid" aria-live="polite"></div>
          <nav class="pagination" id="archivePagination" aria-label="Archive pages"></nav>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <a href="#home">[New]</a>
      <a href="#archive">[Contents]</a>
      <a href="#home">[Info]</a>
      <a href="#archive">[Dept.]</a>
      <a href="art.html">[Eryn’s Reference Collection]</a>
    </footer>

    <script src="script.js?v=10" type="module"></script>
  </body>
</html>
