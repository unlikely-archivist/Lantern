<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>The Lantern</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  min-height: 100vh;
  background-color: #d4d0c8;
  background-image: radial-gradient(rgba(255,255,255,.18) 1px, transparent 1px);
  background-size: 4px 4px;
  color: #111;
  font-family: Arial, Helvetica, sans-serif;
  padding: 22px;
  padding-top: calc(22px + env(safe-area-inset-top));
  padding-right: calc(22px + env(safe-area-inset-right));
  padding-bottom: calc(22px + env(safe-area-inset-bottom));
  padding-left: calc(22px + env(safe-area-inset-left));
}
a { color: #111166; }
.site-shell { max-width: 1120px; margin: 0 auto; }
.site-header {
  text-align: center;
  background: #ececec;
  border: 2px ridge #cfcfcf;
  padding: 24px 20px 20px;
  margin-bottom: 18px;
}
.site-header h1 {
  font-family: Georgia, "Times New Roman", serif;
  color: #990000;
  font-size: clamp(34px, 12vw, 52px);
  letter-spacing: 4px;
  font-weight: normal;
  text-shadow: 1px 1px #fff;
  line-height: 1.05;
}
.header-divider { color: #999; font-size: 13px; letter-spacing: 8px; margin-top: 8px; }
.tagline {
  font-family: Georgia, "Times New Roman", serif;
  font-style: italic;
  font-size: 14px;
  color: #444;
  max-width: 640px;
  margin: 12px auto 0;
  line-height: 1.5;
}
.toolbar {
  background: #c8c8c8;
  border: 2px inset #eee;
  padding: 12px 14px;
  margin-bottom: 14px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.toolbar input,
.toolbar button {
  font-family: Arial, sans-serif;
  font-size: 13px;
  background: #ececec;
  border: 2px outset #fff;
  border-radius: 0;
  color: #000;
  padding: 5px 9px;
}
.toolbar input { flex: 1; min-width: 180px; }
.toolbar button { cursor: pointer; }
.toolbar button:active { border: 2px inset #fff; }
.count { margin-left: auto; color: #555; font-size: 12px; white-space: nowrap; }
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 16px;
}
.card {
  background: #ececec;
  border: 2px ridge #c8c8c8;
  display: flex;
  flex-direction: column;
  min-height: 100%;
}
.card-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: #bbb;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.card-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-body { padding: 10px 11px 12px; display: flex; flex-direction: column; gap: 7px; }
.card-title {
  font-family: Georgia, "Times New Roman", serif;
  color: #990000;
  font-size: 15px;
  line-height: 1.25;
}
.card-caption { color: #333; font-size: 12px; font-style: italic; line-height: 1.45; }
.card-meta { color: #555; font-size: 11px; line-height: 1.4; }
.empty-state {
  background: #ececec;
  border: 2px ridge #c8c8c8;
  color: #555;
  font-size: 14px;
  line-height: 1.55;
  padding: 44px 20px;
  text-align: center;
}
.site-footer {
  margin-top: 24px;
  padding-top: 14px;
  border-top: 1px solid #b9b5ad;
  text-align: center;
}
.site-footer a {
  font-family: Georgia, "Times New Roman", serif;
  color: #111166;
  font-size: 13px;
  text-decoration: none;
  margin: 0 8px;
  white-space: nowrap;
}
.site-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="site-shell">
  <header class="site-header">
    <h1>THE LANTERN</h1>
    <div class="header-divider">✷</div>
    <p class="tagline">An image gallery for strange, overlooked, useful, and beautiful archival material.</p>
  </header>

  <section class="toolbar" aria-label="Gallery tools">
    <input id="searchInput" type="search" placeholder="Search the archive..." autocomplete="off">
    <button type="button" id="resetButton">Reset</button>
    <span class="count" id="count"></span>
  </section>

  <main id="gallery" class="gallery" aria-live="polite"></main>

  <footer class="site-footer">
    <a href="#" onclick="return false;">[New]</a>
    <a href="#" onclick="return false;">[Contents]</a>
    <a href="#" onclick="return false;">[Info]</a>
  </footer>
</div>

<script>
const DATA_URL = 'data/archive-data.json';
const gallery = document.getElementById('gallery');
const searchInput = document.getElementById('searchInput');
const resetButton = document.getElementById('resetButton');
const count = document.getElementById('count');
let records = [];

function normalize(value) {
  return String(value || '').toLowerCase();
}

function recordMatches(record, query) {
  if (!query) return true;
  const haystack = [
    record.title,
    record.caption,
    record.collection_title,
    record.source_id,
    ...(Array.isArray(record.tags) ? record.tags : [])
  ].map(normalize).join(' ');
  return haystack.includes(query);
}

function renderEmpty(message) {
  gallery.innerHTML = `<div class="empty-state">${message}</div>`;
  count.textContent = '0 items';
}

function render() {
  const query = normalize(searchInput.value).trim();
  const visible = records.filter(record => recordMatches(record, query));

  if (!records.length) {
    renderEmpty('The Lantern has been reset. Add new records to <code>data/archive-data.json</code> to begin rebuilding the gallery.');
    return;
  }

  if (!visible.length) {
    renderEmpty('No matches.');
    return;
  }

  count.textContent = `${visible.length} item${visible.length === 1 ? '' : 's'}`;
  gallery.innerHTML = visible.map(record => {
    const title = record.title || 'Untitled';
    const caption = record.caption || '';
    const imgSrc = record.imgSrc || '';
    const sourceUrl = record.sourceUrl || '#';
    const meta = [record.medium, record.time_period, record.collection_title].filter(Boolean).join(' · ');
    return `
      <article class="card">
        <a class="card-image" href="${sourceUrl}" target="_blank" rel="noopener">
          ${imgSrc ? `<img src="${imgSrc}" alt="${title.replace(/"/g, '&quot;')}" loading="lazy">` : 'No image'}
        </a>
        <div class="card-body">
          <h2 class="card-title">${title}</h2>
          ${caption ? `<p class="card-caption">${caption}</p>` : ''}
          ${meta ? `<p class="card-meta">${meta}</p>` : ''}
        </div>
      </article>`;
  }).join('');
}

async function loadData() {
  try {
    const response = await fetch(DATA_URL, { cache: 'no-store' });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const parsed = await response.json();
    records = Array.isArray(parsed) ? parsed : [];
  } catch (error) {
    records = [];
  }
  render();
}

searchInput.addEventListener('input', render);
resetButton.addEventListener('click', () => { searchInput.value = ''; render(); });
loadData();
</script>
</body>
</html>
