name: Publish Lantern

on:
  workflow_dispatch:
  schedule:
    # Run daily at 14:00 UTC, which is morning in Chicago.
    - cron: "0 14 * * *"
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build data files
        run: npm run build:data
        env:
          SMITHSONIAN_API_KEY: ${{ secrets.SMITHSONIAN_API_KEY }}

      - name: Validate data files
        run: npm run validate:data

      - name: Commit generated data when changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update Lantern data from spreadsheet
          file_pattern: data/archive-data.json data/references-data.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
